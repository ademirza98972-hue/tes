<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nova Audio Studio</title>
<script>
/* NOVA AUDIO - ULTIMATE PROTECTION 
   Powered by Puncak Studios
*/
(function() {
    const auth = "novaudio.site";
    if (window.location.hostname !== auth && window.location.hostname !== "localhost" && window.location.hostname !== "127.0.0.1") {
        window.location.href = "https://novaudio.site";
        return;
    }
    // Anti-Inspect & Debugger Trap
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };
    setInterval(function() { (function() {}.constructor("debugger")()); }, 100);
})();
</script>
<style>
    /* Menyembunyikan loading awal agar transisi mulus */
    body { background: #0f0f0f; margin: 0; overflow: hidden; color: #0f0f0f; }
    #app-inject { visibility: hidden; }
</style>
</head>
<body oncontextmenu="return false" onselectstart="return false">

    <div id="app-inject"></div>

    <script>
    window.onload = function() {
        const root = document.getElementById('app-inject');
        
        // Memasukkan seluruh kode asli kamu ke dalam sistem proteksi
        root.innerHTML = `
<style>
/* CSS ASLI NOVA AUDIO */
*{box-sizing:border-box;margin:0;padding:0;user-select:none}
:root{--bg:#0f0f0f;--s1:#161616;--s2:#1e1e1e;--s3:#272727;--border:#2a2a2a;--text:#f0f0f0;--muted:#666;--hint:#3a3a3a;--accent:#c8f261;--accent2:#a8d94f}
html,body{height:100%;font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);font-size:13px;overflow:hidden}
.top{height:52px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-sq{width:26px;height:26px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-sq svg{width:13px;height:13px;fill:#0f0f0f}
.logo-nm{font-size:14px;font-weight:600;letter-spacing:-.4px}
.app-body{display:grid;grid-template-columns:190px 1fr 280px;height:calc(100vh - 52px);overflow:hidden}
.nav{background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 0}
.center{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.content-area{flex:1;display:flex;align-items:center;justify-content:center;padding:18px}
.drop-zone{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;border-radius:10px;border:1px dashed var(--hint)}
.right{background:var(--s1);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:16px}
.gate{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center}
.gate-box{background:var(--s1);border-radius:20px;border:1px solid var(--border);padding:36px;max-width:420px;text-align:center}
.discord-btn{display:inline-flex;align-items:center;gap:6px;background:#5865F2;color:#fff;font-size:12px;font-weight:600;padding:8px 16px;border-radius:8px;text-decoration:none}
</style>

<div class="top">
  <div class="logo">
    <div class="logo-sq"><svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg></div>
    <div class="logo-nm">Nova<em>.Audio</em></div>
  </div>
</div>

<div class="app-body">
  <div class="nav">
    <div style="padding:0 18px; color:var(--muted); font-size:10px">MENU</div>
    <div style="padding:10px 18px; color:var(--accent)">♪ Studio</div>
  </div>
  <div class="center">
    <div class="content-area">
      <div class="drop-zone">
        <div style="font-size:40px">📁</div>
        <div style="font-size:15px; font-weight:600">Drop audio file here</div>
      </div>
    </div>
  </div>
  <div class="right">
    <div style="font-size:10px; color:var(--muted); margin-bottom:15px">CONTROLS</div>
    <p>Speed</p><input type="range" style="width:100%; accent-color:var(--accent)">
    <p style="margin-top:10px">Pitch</p><input type="range" style="width:100%; accent-color:var(--accent)">
  </div>
</div>

<div class="gate" id="loginGate">
  <div class="gate-box">
    <h2>Nova.Audio Studio</h2>
    <p style="color:var(--muted); margin:15px 0">Login dengan Discord untuk menggunakan Nova Audio Studio.</p>
    <a href="https://discord.gg/saNDWMhVt9" class="discord-btn">Login dengan Discord</a>
  </div>
</div>
        `;
        
        // Aktifkan tampilan setelah injeksi selesai
        root.style.visibility = 'visible';
        document.body.style.color = '#f0f0f0';
    };
    </script>
</body>
</html>
