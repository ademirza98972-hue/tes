<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nova Audio Studio</title>
<script>
/* SECURITY PROTOCOL BY PUNCAK STUDIOS 
  Status: Ghost Mode (SSR-Mimic)
*/
(function(){
    const _auth = "novaudio.site";
    if(!window.location.hostname.includes(_auth) && !["localhost","127.0.0.1"].includes(window.location.hostname)){
        window.location.href="https://"+_auth; return;
    }
    // Anti-Inspect & Debugger
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };
    setInterval(function(){ (function(){}.constructor("debugger")()); }, 100);
})();
</script>
<style>

    body { background: #0f0f0f; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Sora', sans-serif; }
    #nova-app { width: 100%; height: 100%; visibility: hidden; }
